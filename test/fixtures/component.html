<!DOCTYPE html>
<html>
<head>
    <title>Button Component - Flux UI</title>
</head>
<body>
    <main>
        <h1>Button</h1>
        <p>The Button component provides a flexible way to create interactive buttons.</p>

        <h2>Basic Usage</h2>
        <pre><code>&lt;flux:button&gt;Click me&lt;/flux:button&gt;</code></pre>

        <h2>Reference</h2>
        <h3>Props</h3>
        <ul>
            <li><strong>variant</strong> - Button style (primary, secondary, danger)</li>
            <li><strong>size</strong> - Button size (sm, md, lg)</li>
            <li><strong>disabled</strong> - Disable the button</li>
        </ul>
    </main>
</body>
</html>
